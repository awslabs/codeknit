version: 2

project_name: codeknit

before:
  hooks:
    - go mod tidy

builds:
  - id: codeknit
    main: ./cmd/codeknit
    binary: codeknit
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows ARM64 cross-compilation not supported locally
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-musl-gcc
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-musl-gcc
      - goos: windows
        goarch: amd64
        env:
          - CC=x86_64-w64-mingw32-gcc

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
